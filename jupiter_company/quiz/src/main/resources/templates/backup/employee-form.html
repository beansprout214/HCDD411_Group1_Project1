<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
 
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
 
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
 
    <title>Save Employee</title>
</head>


<body>
 
    <div class="container">


		<div class="d-flex justify-content-center mb-3">
			<img class="mt-3" src="https://logos-world.net/wp-content/uploads/2020/05/Facebook-Logo.png" width=360 height=200>
		</div>
		<div class="d-flex justify-content-center mb-3">
			<h5>Facebook's Staff Create/Update Form</h5>
		</div>
		
        <hr>
	

        <p class="h4 mb-4">Enter Employee Information</p>
 
	<form action="#" th:action="@{/save}"
		                  th:object="${employee}" method="POST">
						  
		  	<input type="hidden" th:field="*{empno}" />

			<input type="text" th:field="*{first_name}"
			       class="form-control mb-4 w-25" placeholder="First Name" required>

			<input type="text" th:field="*{last_name}"
			       class="form-control mb-4 w-25" placeholder="Last Name" required>

			<input type="text" th:field="*{designation}"
			       class="form-control mb-4 w-25" placeholder="Designation" required>

			<input type="text" th:field="*{hiredate}"
			       class="form-control mb-4 w-25" placeholder="Hire Date (e.g. 17-NOV-97)" required>

			<input type="number" th:field="*{salary}"
			       class="form-control mb-4 w-25" placeholder="Salary" required>

			<input type="number" th:field="*{comm}"
			       class="form-control mb-4 w-25" placeholder="Comm" required>

			<input type="number" th:field="*{deptno}"
			       class="form-control mb-4 w-25" placeholder="Department Number" required>
 
            <button type="submit" class="btn btn-primary col-3 btn-sm">Save Employee</button>
 
        </form>
 
        <hr>
        <a th:href="@{/employees/list}" class="btn btn-secondary col-2 btn-sm">Back to Employees List</a>
 
    </div>
 
 
</body>
 
</html>
