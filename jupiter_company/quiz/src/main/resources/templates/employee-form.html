<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Save Employee - hcddmarket</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #eaeded;
            color: #111;
        }

        /* Main container */
        .main {
            max-width: 700px;
            margin: 40px auto;
            background-color: #fff;
            padding: 32px 40px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        .input-field {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid #a6a6a6;
            border-radius: 4px;
            font-size: 14px;
        }

        .amazon-btn {
            background-color: #f7ca00;
            border: 1px solid #f2c200;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            color: #111;
        }

        .amazon-btn:hover {
            background-color: #eebd00;
        }

        .secondary-btn {
            background-color: #e7e9ec;
            border: 1px solid #adb1b8;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            color: #111;
        }

        .secondary-btn:hover {
            background-color: #d7d9dc;
        }
    </style>
</head>

<body>
<div class="main">

    <div class="title">Enter Employee Information</div>
	
	<form action="#" th:action="@{/employees/save}" th:object="${employee}" method="POST">

	    <input type="hidden" th:field="*{employee_id}" />

	    <input type="text" th:field="*{first_name}" class="input-field" placeholder="First Name" required>

	    <input type="text" th:field="*{last_name}" class="input-field" placeholder="Last Name" required>

	    <input type="text" th:field="*{start_date}" class="input-field" placeholder="Start Date (YYYY-MM-DD)" required>

	    <input type="number" step="0.01" th:field="*{start_salary}" class="input-field" placeholder="Start Salary" required>

	    <input type="text" th:field="*{contract_signed}" class="input-field" placeholder="Contract Signed (Y/N)" required>

	    <input type="number" th:field="*{ssn}" class="input-field" placeholder="SSN (no dashes)" required>

	    <input type="text" th:field="*{birthdate}" class="input-field" placeholder="Birthdate (YYYY-MM-DD)" required>

	    <input type="text" th:field="*{phone_number}" class="input-field" placeholder="Phone Number">

	    <input type="text" th:field="*{emergency_contact_name}" class="input-field" placeholder="Emergency Contact Name">

	    <input type="text" th:field="*{emergency_contact_phone}" class="input-field" placeholder="Emergency Contact Phone">

	    <button type="submit" class="amazon-btn">Save Employee</button>

	</form>


    <div style="margin-top: 20px;">
        <a th:href="@{/employees/list}" class="secondary-btn">Back to Employees List</a>
    </div>

</div>

</body>

</html>
