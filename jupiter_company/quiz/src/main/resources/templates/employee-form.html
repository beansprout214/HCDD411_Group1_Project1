<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Save Employee</title>
</head>

<body>

<h1>Enter Employee Information</h1>

<form action="#" th:action="@{/employees/save}" th:object="${employee}" method="POST">

    <input type="hidden" th:field="*{employee_id}" />

    <p>
        First Name:
        <input type="text" th:field="*{first_name}" required>
    </p>

    <p>
        Last Name:
        <input type="text" th:field="*{last_name}" required>
    </p>

    <p>
        Start Date:
        <input type="date" th:field="*{start_date}" required>
    </p>

    <p>
        Start Salary:
        <input type="number" step="0.01" th:field="*{start_salary}" required>
    </p>

    <p>
        Contract Signed (Y/N):
        <input type="text" th:field="*{contract_signed}" required>
    </p>

    <p>
        SSN (no dashes):
        <input type="number" th:field="*{ssn}" required>
    </p>

    <p>
        Birthdate:
        <input type="date" th:field="*{birthdate}" required>
    </p>

    <p>
        Phone Number:
        <input type="text" th:field="*{phone_number}">
    </p>

    <p>
        Emergency Contact Name:
        <input type="text" th:field="*{emergency_contact_name}">
    </p>

    <p>
        Emergency Contact Phone:
        <input type="text" th:field="*{emergency_contact_phone}">
    </p>

    <button type="submit">Save Employee</button>

</form>

<p>
    <a th:href="@{/employees/list}">Back to Employees List</a>
</p>

</body>
</html>
