<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Jupiter Company – Employee Directory</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4b79a1, #283e51);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 0;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            width: 90%;
            max-width: 1200px;
            text-align: center;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        /* Table styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            color: white;
            font-size: 14px;
        }

        thead th {
            background: rgba(255, 255, 255, 0.25);
            padding: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        tbody td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* Action buttons */
        .actions {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .actions a,
        .actions button,
        table a {
            display: inline-block;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .actions a:hover,
        .actions button:hover,
        table a:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .logout-btn {
            background: rgb(203, 52, 56) !important;
        }

        .logout-btn:hover {
            background: rgb(160, 35, 38) !important;
        }
		
		.actions button,
		.actions button:focus,
		.actions button:active {
		    outline: none;
		    border: none;
		}

        form {
            margin: 0;
        }
		
		.del-btn {
		    background: rgb(223, 142, 32) !important;
		    color: white;
		}

		.del-btn:hover {
		    background: rgb(199, 104, 35) !important;
		    color: white;
		}
    </style>
</head>

<body>

<div class="glass">

    <div class="logo">Jupiter Company ✈️</div>
    <div class="subtitle">Employee Directory</div>

    <table>
        <thead>
        <tr>
            <th>Employee ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Start Date</th>
            <th>Start Salary</th>
            <th>Contract Signed</th>
            <th>SSN</th>
            <th>Birthdate</th>
            <th>Phone Number</th>
            <th>Emergency Contact Name</th>
            <th>Emergency Contact Phone</th>
            <th sec:authorize="hasAnyRole('MANAGER','ADMIN')">Update</th>
            <th sec:authorize="hasAnyRole('ADMIN')">Delete</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="tempEmployee : ${employees}">
            <td th:text="${tempEmployee.employee_id}"></td>
            <td th:text="${tempEmployee.first_name}"></td>
            <td th:text="${tempEmployee.last_name}"></td>
            <td th:text="${tempEmployee.start_date}"></td>
            <td th:text="${tempEmployee.start_salary}"></td>
            <td th:text="${tempEmployee.contract_signed}"></td>
            <td th:text="${tempEmployee.ssn}"></td>
            <td th:text="${tempEmployee.birthdate}"></td>
            <td th:text="${tempEmployee.phone_number}"></td>
            <td th:text="${tempEmployee.emergency_contact_name}"></td>
            <td th:text="${tempEmployee.emergency_contact_phone}"></td>

            <td sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                <a th:href="@{/employees/showFormForUpdate(employee_id=${tempEmployee.employee_id})}">
                    Update
                </a>
            </td>

            <td sec:authorize="hasAnyRole('ADMIN')">
                <a th:href="@{/employees/delete(employee_id=${tempEmployee.employee_id})}"
                   onclick="return confirm('Are you sure you want to delete this employee?')"
				   class="del-btn">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="actions">
        <a th:href="@{/employees/showFormForAdd}" sec:authorize="hasRole('MANAGER')">
            Add Employee
        </a>

        <form th:action="@{/logout}" method="POST">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

</div>

</body>
</html>
