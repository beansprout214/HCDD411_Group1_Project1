<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Employee Directory</title>
</head>

<body>

<h1>Employee Directory</h1>

<table border="1" cellpadding="5">
    <thead>
    <tr>
        <th>Employee ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Start Date</th>
        <th>Start Salary</th>
        <th>Contract Signed</th>
        <th>SSN</th>
        <th>Birthdate</th>
        <th>Phone Number</th>
        <th>Emergency Contact Name</th>
        <th>Emergency Contact Phone</th>
        <th sec:authorize="hasAnyRole('DIRECTOR','ADMIN')">Update</th>
        <th sec:authorize="hasAnyRole('DIRECTOR','ADMIN')">Delete</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="tempEmployee : ${employees}">
        <td th:text="${tempEmployee.employee_id}"></td>
        <td th:text="${tempEmployee.first_name}"></td>
        <td th:text="${tempEmployee.last_name}"></td>
        <td th:text="${tempEmployee.start_date}"></td>
        <td th:text="${tempEmployee.start_salary}"></td>
        <td th:text="${tempEmployee.contract_signed}"></td>
        <td th:text="${tempEmployee.ssn}"></td>
        <td th:text="${tempEmployee.birthdate}"></td>
        <td th:text="${tempEmployee.phone_number}"></td>
        <td th:text="${tempEmployee.emergency_contact_name}"></td>
        <td th:text="${tempEmployee.emergency_contact_phone}"></td>

        <td sec:authorize="hasAnyRole('DIRECTOR','ADMIN')">
            <a th:href="@{/employees/showFormForUpdate(employee_id=${tempEmployee.employee_id})}">
                Update
            </a>
        </td>

        <td sec:authorize="hasAnyRole('DIRECTOR','ADMIN')">
            <a th:href="@{/employees/delete(employee_id=${tempEmployee.employee_id})}"
               onclick="return confirm('Are you sure you want to delete this employee?')">
                Delete
            </a>
        </td>
    </tr>
    </tbody>
</table>

<p sec:authorize="hasRole('MANAGER')">
    <a th:href="@{/employees/showFormForAdd}">Add Employee</a>
</p>

<form th:action="@{/logout}" method="POST">
    <button type="submit">Logout</button>
</form>

</body>
</html>
