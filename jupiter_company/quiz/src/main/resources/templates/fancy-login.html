<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Login - hcddmarket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #eaeded;
            color: #111;
        }

        /* Header */
        .header {
            background-color: #131921;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ff9900;
        }

        .logo span {
            color: #fff;
            font-size: 18px;
            margin-left: 4px;
        }

        /* Login card */
        .login-container {
            max-width: 420px;
            margin: 60px auto;
            background-color: #fff;
            padding: 28px 32px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .login-title {
            font-size: 22px;
            margin-bottom: 18px;
            font-weight: bold;
        }

        .input-field {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid #a6a6a6;
            border-radius: 4px;
            font-size: 14px;
        }

        .amazon-btn {
            width: 100%;
            background-color: #f7ca00;
            border: 1px solid #f2c200;
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 6px;
        }

        .amazon-btn:hover {
            background-color: #eebd00;
        }

        .alert {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-danger {
            background-color: #fddede;
            border: 1px solid #cc0c39;
            color: #a40000;
        }

        .alert-success {
            background-color: #d4f5d2;
            border: 1px solid #4caf50;
            color: #2e7d32;
        }

        .footer {
            margin-top: 40px;
            padding: 20px 0 30px;
            font-size: 12px;
            color: #565959;
            text-align: center;
        }

        .footer a {
            color: #007185;
            text-decoration: none;
            margin: 0 6px;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">hcdd<span>market</span></div>
    </div>

    <div class="login-container">

        <div class="login-title">Sign-In</div>

        <form action="#" th:action="@{/authenticateTheUser}" method="POST">

            <div th:if="${param.error}">
                <div class="alert alert-danger">
                    Invalid username or password.
                </div>
            </div>

            <input type="text" name="username" placeholder="Username" class="input-field" />

            <input type="password" name="password" placeholder="Password" class="input-field" />

            <button type="submit" class="amazon-btn">Login</button>

            <div th:if="${param.logout}">
                <div class="alert alert-success" style="margin-top: 16px;">
                    You have been logged out.
                </div>
            </div>

        </form>

    </div>

    <div class="footer">
        <div>
            <a href="#">Help</a> |
            <a href="#">Privacy</a> |
            <a href="#">Terms</a>
        </div>
        <div style="margin-top: 6px;">
            HCDD 411 Employee Management Portal © <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2024</span>
        </div>
    </div>

</body>

</html>
