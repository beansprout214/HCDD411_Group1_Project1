<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiter Company – Save Employee</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4b79a1, #283e51);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding: 40px 20px;
            color: white;
            box-sizing: border-box;
        }

        .glass {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 500px; 
            text-align: center;
        }

        .logo {
            font-size: 32px; 
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        form {
            text-align: left;
            margin-top: 10px;
        }

        label {
            font-weight: bold;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            display: block;
            margin-left: 2px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            margin-top: 6px;
            margin-bottom: 18px;
            box-sizing: border-box;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

       
        input::placeholder {
            color: rgba(255, 255, 255, 0.8);
            opacity: 1;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

      
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
            width: 100%;
        }

        .actions a,
        .actions button {
            display: block;
            width: 100%;
            text-align: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.25);
            border: none;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s ease;
            box-sizing: border-box;
        }

        .actions a:hover,
        .actions button:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .save-btn {
            background: #2ecc71 !important;
        }

        .save-btn:hover {
            background: #27ae60 !important;
        }

        .actions a.back-btn {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .actions a.back-btn:hover {
            background: rgba(255, 255, 255, 0.2) !important;
        }
    </style>
</head>

<body>

<div class="glass">

    <div class="logo">Jupiter Company ✈️</div>
    <div class="subtitle">Enter Employee Information</div>

    <form action="#" th:action="@{/employees/save}" th:object="${employee}" method="POST">

        <input type="hidden" th:field="*{employee_id}" />

        <label>First Name:</label>
        <input type="text" th:field="*{first_name}" placeholder="Enter first name" required>

        <label>Last Name:</label>
        <input type="text" th:field="*{last_name}" placeholder="Enter last name" required>

        <label>Start Date:</label>
        <input type="date" th:field="*{start_date}" required>

        <label>Start Salary:</label>
        <input type="number" step="0.01" th:field="*{start_salary}" placeholder="0.00" required>

        <label>Contract Signed (Y/N):</label>
        <input type="text" th:field="*{contract_signed}" maxlength="1" placeholder="Y" required>

        <label>SSN (no dashes):</label>
        <input type="number" th:field="*{ssn}" placeholder="9 digits" required>

        <label>Birthdate:</label>
        <input type="date" th:field="*{birthdate}" required>

        <label>Phone Number:</label>
        <input type="text" th:field="*{phone_number}" placeholder="Enter phone number">

        <label>Emergency Contact Name:</label>
        <input type="text" th:field="*{emergency_contact_name}" placeholder="Contact name">

        <label>Emergency Contact Phone:</label>
        <input type="text" th:field="*{emergency_contact_phone}" placeholder="Contact phone">

        <div class="actions">
            <button type="submit" class="save-btn">Save Employee</button>
            <a th:href="@{/employees/list}" class="back-btn">Back to Employees List</a>
        </div>

    </form>

</div>

</body>
</html>
