<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
				xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Employee Directory</title>
 
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>

<!-- https://www.quackit.com/html/html_editors/scratchpad/?example=/html/templates/tables/team_roster_table -->
<style>
	.roster-table {
	    width: 100%;
	    border-collapse: collapse;
	    font-family: 'Helvetica Neue', Arial, sans-serif;
	}

	.roster-table caption {
	    font-size: 1.5rem;
	    font-weight: bold;
	    margin-bottom: 1.5rem;
	    text-align: left;
	}

	.roster-table thead th {
	    background-color: #333;
	    color: white;
	    font-weight: 600;
	    text-align: left;
	    padding: 12px 15px;
	    font-size: 0.9rem;
	    text-transform: uppercase;
	}
	.roster-table .th-center {
	    text-align: center;
	}

	.roster-table tbody td {
	    padding: 12px 15px;
	    border-bottom: 1px solid #ddd;
	}
	.roster-table .td-center {
	    text-align: center;
	}

	.roster-table .player-name {
	    font-weight: bold;
	}

	/* Zebra-striping for readability */
	.roster-table tbody tr:nth-of-type(even) {
	    background-color: #f8f8f8;
	}

	.roster-table tbody tr:hover {
	    background-color: #efefef;
	}
</style>

<body>
<div class="container">

	<div class="d-flex justify-content-center mb-3">
		<img class="mt-3" src="https://logos-world.net/wp-content/uploads/2020/05/Facebook-Logo.png" width=360 height=200>
	</div>
	<div class="d-flex justify-content-center mb-3">
		<h5>Facebook's Current Staff</h5>
	</div>
	
    <hr>
	
    <table class="roster-table">
        <thead class="table-dark">
            <tr>
				<th>Emp No</th>
				<th>First Name</th>
				<th>Last Name</th>
				<th>Designation</th>
				<th>Hire Date</th>
				<th>Salary</th>
				<th>Comm</th>
				<th>Dept No</th>
				<div sec:authorize="hasAnyRole('DIRECTOR', 'ADMIN')">
				<th></th>
				<th></th>
				</div>

				
            </tr>
        </thead>
 
        <tbody>
            <tr th:each="tempEmployee : ${employees}">
 
				<td th:text="${tempEmployee.empno}"></td>
				<td th:text="${tempEmployee.first_name}"></td>
				<td th:text="${tempEmployee.last_name}"></td>
				<td th:text="${tempEmployee.designation}"></td>
				<td th:text="${tempEmployee.hiredate}"></td>
				<td th:text="${tempEmployee.salary}"></td>
				<td th:text="${tempEmployee.comm}"></td>
				<td th:text="${tempEmployee.deptno}"></td>


				<div sec:authorize="hasAnyRole('DIRECTOR', 'ADMIN')">
				<td>
				    <a th:href="@{/employees/showFormForUpdate(empno=${tempEmployee.empno})}"
				       class="btn btn-info btn-sm">
				        Update
				    </a>
				</td>
				
				<td>
				    <a th:href="@{/employees/delete(empno=${tempEmployee.empno})}"
				       class="btn btn-danger btn-sm"
				       onclick="if(!(confirm('Are you sure you want to delete this employee?'))) return false">
				        Delete
				    </a>
				</td>
				</div>
				

            </tr>
        </tbody>
    </table>
		<div class="d-flex justify-content-center mb-3 mt-4">

			<div sec:authorize="hasRole('MANAGER')">
				
			<a th:href="@{/employees/showFormForAdd}"
			class="btn btn-primary btn-sm mb-3 me-3">
				Add Employee
			</a>

			</div>
			
			<a th:href="@{/employees/list/filtered}"
			class="btn btn-primary btn-sm mb-3 me-3">
				Filter by Salary (>45,000)
			</a>

			<a th:href="@{/employees/list}"
			class="btn btn-primary btn-sm mb-3 me-3">
				Remove Filter
			</a>
			
		   <form action="#" th:action="@{/logout}" method="POST">
		       <input type="submit" class="btn btn-primary btn-sm mb-3 me-3" value="Logout" />
		   </form>  
		</div>
 
</div>
 
</body>
</html>
